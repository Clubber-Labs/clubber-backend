services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: conectai-postgres
    restart: unless-stopped
    ports:
      # Bind só no loopback: o banco não deve ficar acessível pela rede/LAN.
      # (antes "5432:5432" publicava em 0.0.0.0). O app local conecta via 127.0.0.1.
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conectai_dev
    volumes:
      - conectai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: conectai-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      # Redis sem autenticação — manter só no loopback (antes "6379:6379" em 0.0.0.0).
      - "127.0.0.1:6379:6379"
    volumes:
      - conectai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── PgBouncer (pooler de conexão, transaction mode) ─────────────────────────
  # Sobe SÓ com o profile `cluster`. Multiplexa as conexões das N réplicas da API
  # num pool pequeno de conexões reais ao Postgres (DEFAULT_POOL_SIZE), evitando
  # que o nº de conexões cresça com réplicas × connection_limit e sature o banco.
  # O Prisma fala com ele via DATABASE_POOL_URL e desabilita prepared statements
  # (pgbouncer=true), exigido pelo transaction mode.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: ["cluster"]
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: conectai_dev
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5432"
    restart: unless-stopped

  # ── Cluster de teste de carga (Seção 4.1.15 / RNF05.1) ──────────────────────
  # Sobe SÓ com o profile `cluster`; o fluxo normal (`up -d postgres redis`,
  # launch.sh) não é afetado. Demonstra escalabilidade horizontal: N réplicas da
  # API atrás do nginx, compartilhando o mesmo Postgres/Redis.
  #   docker compose --profile cluster up --build --scale api=3 -d
  api:
    build:
      context: .
    profiles: ["cluster"]
    # Reusa todos os segredos de dev (Stripe etc., exigidos no boot)...
    env_file:
      - .env.local
    # ...e repõe DB/Redis para os nomes de serviço da rede do compose.
    environment:
      # DATABASE_URL = Postgres DIRETO (migrations rodam por aqui no boot).
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/conectai_dev
      # DATABASE_POOL_URL = runtime via PgBouncer (transaction mode). O Prisma
      # roteia as queries por aqui e desabilita prepared statements.
      DATABASE_POOL_URL: postgresql://postgres:postgres@pgbouncer:5432/conectai_dev
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      PORT: "3333"
      STORAGE_DRIVER: local
      METRICS_ENABLED: "true"
      # Desliga o rate limit p/ os 429 não poluírem latência/throughput no teste
      # de desempenho (toggle introduzido em feat/rate-limit-via-env / #91).
      RATE_LIMIT_ENABLED: "false"
      # Desliga jobs de fundo p/ a CPU medida ser só a da carga HTTP.
      BILLING_SYNC_ENABLED: "false"
      FEATURED_RECONCILE_ENABLED: "false"
      NOTIFICATIONS_ENABLED: "false"
      ACCOUNT_DELETION_ENABLED: "false"
      SPOT_LIFECYCLE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    expose:
      - "3333"
    # 1 vCPU por réplica: a varredura 1->2->3 réplicas mede o ganho ~linear
    # dentro do orçamento de cores (compose v2 honra isto no `up`).
    deploy:
      resources:
        limits:
          cpus: "1.0"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    profiles: ["cluster"]
    depends_on:
      - api
    ports:
      - "3333:3333" # ponto único de entrada do k6 (não rode `pnpm dev` junto)
    volumes:
      - ./load-tests/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  conectai_pgdata:
  conectai_redis_data:
