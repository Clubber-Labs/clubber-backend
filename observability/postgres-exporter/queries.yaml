# Queries customizadas do postgres_exporter.
#
# Replication lag em segundos: 0 no primário (não está em recovery), e o atraso
# real do replay do WAL quando o exporter aponta para uma RÉPLICA. É a métrica
# nº 1 a vigiar quando há read replica — lag alto = leituras velhas servidas por
# prismaRead. Exposta como pg_replication_lag_seconds.
pg_replication:
  query: >
    SELECT CASE
      WHEN NOT pg_is_in_recovery() THEN 0
      ELSE GREATEST(0, EXTRACT(EPOCH FROM (now() - pg_last_xact_replay_timestamp())))
    END AS lag_seconds
  master: true
  metrics:
    - lag_seconds:
        usage: GAUGE
        description: 'Replication lag em segundos (0 no primário)'
